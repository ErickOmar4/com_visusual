<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrusel con Descripciones</title>
    <link rel="stylesheet" href="css/carrusel.css">
</head>
<body>

    <div class="carousel">
        <button class="btn-cuadrado" id="retroceder"></button>
        <div id="imagen">
            <div id="info-imagen"></div>
        </div>
        <button class="btn-cuadrado" id="avanzar"></button>
    </div>

    <div class="controles">
        <button id="play"> Avanzar </button>
        <button id="stop"> Detener</button>
    </div>

    <!-- Enlaces de los scripts -->
    <script src="js/utileria.js"></script>
    <script src="js/carrusel.js"></script>
</body>
</html>
